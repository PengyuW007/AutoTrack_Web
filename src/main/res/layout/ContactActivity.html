<main class="contact-page">

    <section class="section-title">
        <h1>Let's Connect</h1>
        <p>Open to new opportunities, collaborations, and interesting projects</p>
    </section>

    <section class="contact-cards">
        <article class="contact-card">
            <div class="icon">✉</div>
            <h2>Email</h2>
<!--            <p>pengyuwang777@gmail.com</p>-->
        </article>

        <article class="contact-card">
            <div class="icon">⌘</div>
            <h2>GitHub</h2>
<!--            <p>@yourusername</p>-->
        </article>

        <article class="contact-card">
            <div class="icon">in</div>
            <h2>LinkedIn</h2>
<!--            <p>Your Name</p>-->
        </article>
    </section>

    <section class="contact-form-card">
        <form>
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" type="text" placeholder="Your name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="your@email.com">
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input id="subject" type="text" placeholder="What's this about?">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="Tell me about your project or opportunity..."></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </section>

</main>
